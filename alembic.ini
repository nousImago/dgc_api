# A generic, single database configuration.
# Most options are driven by alembic/env.py; only script_location and
# the logging setup live here.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file_template timestamps
timezone = UTC

# Max length of slug field generated from revision message
truncate_slug_length = 40

# sqlalchemy.url is set dynamically in env.py from config.settings.
# Leave this placeholder so alembic doesn't error on missing url in offline mode.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Run ruff format on every newly generated migration script.
# Requires ruff in the venv. Comment out if not wanted.
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
