# Default values for dgc-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: harbor.postway.co.th/dgc-develop/dgcstore/api
  pullPolicy: Always. #IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"
  
envs:
  - name: TZ
    value: "Asia/Bangkok"

imagePullSecrets:
  - name: regcred
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  annotations: 
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1024m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1024m"
  hosts:
    - host: app.thepostway.com
      paths: 
        - /(.*)

resources:
  # Sized for the WeasyPrint-backed PDF endpoints: Pango/HarfBuzz, font
  # tables, and per-render cairo surfaces add ~30-60 MB to baseline RSS
  # plus transient allocations during generation. The previous 32Mi limit
  # OOMKilled even at idle.
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 384Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

fluentbit:
  enabled: false
  logBucket: "dgc"
  minioEndpoint: "http://minio-service:9000"
  minioAccessKey: ""
  minioSecretKey: ""

# Run alembic upgrade head as a pre-install / pre-upgrade Helm hook.
# When disabled, migrations must be run manually via `kubectl exec`.
migration:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Run scripts/seed_db.py as a post-install / post-upgrade Helm hook.
# Seeds permissions, roles, price types, and (on first install) the admin user.
# Idempotent — safe to run on every deploy. The admin password is only set on
# *first* creation; re-runs do NOT reset it. Override `adminPassword` on the
# very first install (e.g. `--set seed.adminPassword='…'`); it can stay blank
# on subsequent upgrades.
seed:
  enabled: true
  adminPassword: ""   # only used on first install; left blank means seed_db falls back to "admin" — override on first install for prod
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
