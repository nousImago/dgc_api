imagePullSecrets:
  - name: regcred

nameOverride: ""
fullnameOverride: "dgcstore-api"

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /api/$2
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1024m"
  hosts:
    - host: dev.tench.ai
      paths:
        - /api(/|$)(.*)

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 1
    memory: 2Gi
  requests:
    cpu: 0.01
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

# nodeSelector:
#   kubernetes.io/hostname: vm2

tolerations: []

affinity: {}

migration:
  enabled: false  # ตั้งเป็น false ถ้ายังไม่อยากให้รัน Database Migration Job
                  # หรือตั้งเป็น true ถ้าต้องการให้ Job ทำงาน

fluentbit:
  enabled: true   #  เป็น true เพื่อเปิดใช้งาน
  image: "harbor.postway.co.th/cardinal/fluent/fluent-bit:3.1"
  logBucket: "cardinaldev-log"
  minioEndpoint: "storage-hq.postway.co.th"
  minioAccessKey: "qkwMyXqTflZ0l4RbtWvX"
  minioSecretKey: "3TXIISJ8Rhr1dpoBluhYMGWOf6tOidkjrHqG4yhC"

