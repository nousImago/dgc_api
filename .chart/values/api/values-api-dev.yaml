# Default values for dgc-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: harbor.postway.co.th/cardinal-develop/dgcstore/api
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

envs:
  - name: TZ
    value: "Asia/Bangkok"

