# Default values for dgc-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: harbor.postway.co.th/cardinal/dgcstore/api
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

envs:
  - name: TZ
    value: "Asia/Bangkok"

#----------CARDINAL DATABASE----------
  - name: DGC_DB_HOST
    value: "192.168.1.184"
  - name: DGC_DB_PORT
    value: "5432"
  - name: DGC_DB_USER
    value: "cardinal"
  - name: DGC_DB_PASS
    value: "cardinal0nCl0ucl"
  - name: DGC_DB_NAME
    value: "dgc"
  - name: DGC_DB_SCHEMA
    value: "public"
  - name: DATABASE_URL
    value: "postgresql+asyncpg://cardinal:cardinal0nCl0ucl@192.168.1.184:5432/dgc"

#----------JWT----------
  - name: JWT_SECRET
    value: "prod-secret-replace-with-strong-random-value"

#----------MINIO----------
  - name: MINIO_ENDPOINT
    value: "storage-hq.postway.co.th"
  - name: MINIO_ACCESS_KEY
    value: "qkwMyXqTflZ0l4RbtWvX"
  - name: MINIO_SECRET_KEY
    value: "3TXIISJ8Rhr1dpoBluhYMGWOf6tOidkjrHqG4yhC"
  - name: MINIO_BUCKET_NAME
    value: "cardinal"

#----------EMAIL (Gmail / Google Workspace)----------
# Generate an app password at https://myaccount.google.com/apppasswords
# (regular Gmail passwords won't work with SMTP).
  - name: SMTP_HOST
    value: "smtp.gmail.com"
  - name: SMTP_PORT
    value: "587"
  - name: SMTP_USER
    value: "info@cardinalfilm.com"
  - name: SMTP_PASSWORD
    value: "mlpt oito urlm blpv"   # TODO: paste the 16-char Google app password here before deploy
  - name: SMTP_FROM
    value: "Cardinal Service <info@cardinalfilm.com>"
  - name: SMTP_USE_TLS
    value: "true"


imagePullSecrets:
  - name: regcred

nameOverride: ""
fullnameOverride: "dgcstore-api"

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /api/$2
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1024m"
  hosts:
    - host: tench.ai
      paths:
        - /api(/|$)(.*)

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  limits:
    cpu: 1
    memory: 2Gi
  requests:
    cpu: 0.01
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

migration:
  enabled: false  # ตั้งเป็น false ถ้ายังไม่อยากให้รัน Database Migration Job
                  # หรือตั้งเป็น true ถ้าต้องการให้ Job ทำงาน

fluentbit:
  enabled: true   #  เป็น true เพื่อเปิดใช้งาน
  image: "harbor.postway.co.th/cardinal/fluent/fluent-bit:3.1"
  logBucket: "cardinal-log"
  minioEndpoint: "storage-hq.postway.co.th"
  minioAccessKey: "qkwMyXqTflZ0l4RbtWvX"
  minioSecretKey: "3TXIISJ8Rhr1dpoBluhYMGWOf6tOidkjrHqG4yhC"